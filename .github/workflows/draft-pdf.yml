# Builds the JOSS paper draft PDF on every paper change (openjournals action).
# Download it from the run's artifacts to preview what @editorialbot will see.
name: Draft PDF

on:
  push:
    paths:
      - 'paper/**'
      - '.github/workflows/draft-pdf.yml'
  workflow_dispatch:

jobs:
  paper:
    runs-on: ubuntu-latest
    name: Paper draft
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build draft PDF
        uses: openjournals/openjournals-draft-action@master
        with:
          journal: joss
          paper-path: paper/paper.md
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: paper
          path: paper/paper.pdf
