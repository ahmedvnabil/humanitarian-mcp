<svg viewBox="0 0 900 96" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Mono','SF Mono',Menlo,Consolas,monospace" role="img" aria-label="21 tools, 4 data sources, 8 prompts, 153 tests, 75 years of data">
  <rect x="0" y="0" width="900" height="96" fill="#141c2e"/>
  <rect x="0.5" y="0.5" width="899" height="95" fill="none" stroke="#2c3a5c" stroke-width="1"/>
  <line x1="180" y1="16" x2="180" y2="80" stroke="#2c3a5c"/>
  <line x1="360" y1="16" x2="360" y2="80" stroke="#2c3a5c"/>
  <line x1="540" y1="16" x2="540" y2="80" stroke="#2c3a5c"/>
  <line x1="720" y1="16" x2="720" y2="80" stroke="#2c3a5c"/>

  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="0.15s" dur="0.6s" fill="freeze"/>
    <text x="90" y="48" font-size="27" font-weight="bold" fill="#f6f1e7" text-anchor="middle">21</text>
    <text x="90" y="70" font-size="11" fill="#9aa3bd" text-anchor="middle" letter-spacing="2">TOOLS</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="0.3s" dur="0.6s" fill="freeze"/>
    <text x="270" y="48" font-size="27" font-weight="bold" fill="#f6f1e7" text-anchor="middle">4</text>
    <text x="270" y="70" font-size="11" fill="#9aa3bd" text-anchor="middle" letter-spacing="2">DATA SOURCES</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="0.45s" dur="0.6s" fill="freeze"/>
    <text x="450" y="48" font-size="27" font-weight="bold" fill="#f6f1e7" text-anchor="middle">8</text>
    <text x="450" y="70" font-size="11" fill="#9aa3bd" text-anchor="middle" letter-spacing="2">PROMPTS</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="0.6s" dur="0.6s" fill="freeze"/>
    <text x="630" y="48" font-size="27" font-weight="bold" fill="#f6f1e7" text-anchor="middle">153</text>
    <text x="630" y="70" font-size="11" fill="#9aa3bd" text-anchor="middle" letter-spacing="2">TESTS</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="0.75s" dur="0.6s" fill="freeze"/>
    <text x="810" y="48" font-size="27" font-weight="bold" fill="#f6f1e7" text-anchor="middle">75</text>
    <text x="810" y="70" font-size="11" fill="#9aa3bd" text-anchor="middle" letter-spacing="2">YEARS OF DATA</text>
  </g>

  <rect x="-140" y="93" width="140" height="2" fill="#e3a83a" opacity="0.75">
    <animate attributeName="x" values="-140;900" dur="5.5s" repeatCount="indefinite"/>
  </rect>
</svg>
